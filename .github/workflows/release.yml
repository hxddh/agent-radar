name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          NOTES="docs/release-${TAG}.md"
          if [ -f "$NOTES" ]; then
            echo "notes=$NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "notes=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES: ${{ steps.meta.outputs.notes }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$NOTES" --title "Agent Radar $TAG"
          else
            gh release create "$TAG" --notes-file "$NOTES" --title "Agent Radar $TAG"
          fi
