name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            # The input is documented as an EXISTING tag. Verify it actually
            # exists so a typo cannot silently create a new tag at branch HEAD.
            if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "Tag '$TAG' does not exist. Create and push the tag first." >&2
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          NOTES="docs/release-${TAG}.md"
          if [ -f "$NOTES" ]; then
            echo "notes=$NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "notes=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES: ${{ steps.meta.outputs.notes }}
        run: |
          set -eu
          # The tag is guaranteed to exist by the resolve step, so `gh release
          # create` publishes the existing tag rather than fabricating one.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$NOTES" --title "Agent Radar $TAG"
          else
            gh release create "$TAG" --verify-tag --notes-file "$NOTES" --title "Agent Radar $TAG"
          fi
