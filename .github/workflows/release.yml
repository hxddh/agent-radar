name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, for example v0.2.0"
        required: true
        type: string
      create_tag:
        description: "Create the tag at the dispatched ref if it does not exist"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          CREATE_TAG: ${{ github.event.inputs.create_tag }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              # A missing tag is only created when the operator explicitly opts
              # in via create_tag; otherwise refuse, so a typo cannot silently
              # fabricate a tag at branch HEAD.
              if [ "${CREATE_TAG:-false}" = "true" ]; then
                git config user.name "agent-radar-release"
                git config user.email "agent-radar-release@users.noreply.github.com"
                git tag -a "$TAG" -m "Agent Radar $TAG"
                git push origin "refs/tags/$TAG"
              else
                echo "Tag '$TAG' does not exist. Re-run with create_tag=true to tag this ref, or push the tag first." >&2
                exit 1
              fi
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          NOTES="docs/release-${TAG}.md"
          if [ -f "$NOTES" ]; then
            echo "notes=$NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "notes=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES: ${{ steps.meta.outputs.notes }}
        run: |
          set -eu
          # The tag is guaranteed to exist by the resolve step, so `gh release
          # create` publishes the existing tag rather than fabricating one.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$NOTES" --title "Agent Radar $TAG"
          else
            gh release create "$TAG" --verify-tag --notes-file "$NOTES" --title "Agent Radar $TAG"
          fi
