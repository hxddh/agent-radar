name: Cloud Agent

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - daily
          - weekly
          - monthly
          - source-sweep
          - promote-candidates
      date:
        description: "Optional date, YYYY-MM-DD"
        required: false
        type: string
  repository_dispatch:
    types: [cloud-agent]

permissions:
  contents: write
  models: read
  issues: write

concurrency:
  group: cloud-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      AGENT_RADAR_MODEL_PROVIDER: ${{ vars.AGENT_RADAR_MODEL_PROVIDER || 'github-models' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4o' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      CHEAP_SCREEN_MODEL: ${{ vars.CHEAP_SCREEN_MODEL || 'openai/gpt-5-nano' }}
      MAIN_RESEARCH_MODEL: ${{ vars.MAIN_RESEARCH_MODEL || 'openai/gpt-oss-120b' }}
      FINAL_SYNTHESIS_MODEL: ${{ vars.FINAL_SYNTHESIS_MODEL || 'openai/gpt-oss-120b' }}
      MAX_PUBLIC_SOURCE_ITEMS: ${{ vars.MAX_PUBLIC_SOURCE_ITEMS || '' }}
      PUBLIC_SOURCE_COLLECTION: ${{ vars.PUBLIC_SOURCE_COLLECTION || 'true' }}
      MAX_AI_GATEWAY_CALLS_PER_TASK: ${{ vars.MAX_AI_GATEWAY_CALLS_PER_TASK || '' }}
      MAX_PROMPT_CHARS: ${{ vars.MAX_PROMPT_CHARS || '' }}
      MAX_CONTEXT_FILE_CHARS: ${{ vars.MAX_CONTEXT_FILE_CHARS || '' }}
      MAX_SCREEN_PROMPT_CHARS: ${{ vars.MAX_SCREEN_PROMPT_CHARS || '' }}
      RESEARCH_LOG_CONTEXT_CHARS: ${{ vars.RESEARCH_LOG_CONTEXT_CHARS || '' }}
      WATCHLIST_CONTEXT_CHARS: ${{ vars.WATCHLIST_CONTEXT_CHARS || '' }}
      SOURCES_CONTEXT_CHARS: ${{ vars.SOURCES_CONTEXT_CHARS || '' }}
      MAX_SCREEN_SOURCE_ITEMS: ${{ vars.MAX_SCREEN_SOURCE_ITEMS || '' }}
      CONTEXT_SLICING: ${{ vars.CONTEXT_SLICING || 'true' }}
      SHARED_SCREENING: ${{ vars.SHARED_SCREENING || 'true' }}
      INCLUDE_MAINTENANCE_CONTEXT: ${{ vars.INCLUDE_MAINTENANCE_CONTEXT || 'false' }}
      INCLUDE_RUNBOOK_CONTEXT: ${{ vars.INCLUDE_RUNBOOK_CONTEXT || 'false' }}
      DRY_RUN_ON_BUDGET_EXCEEDED: ${{ vars.DRY_RUN_ON_BUDGET_EXCEEDED || 'true' }}
      AI_GATEWAY_FALLBACK_MODELS: ${{ vars.AI_GATEWAY_FALLBACK_MODELS || 'openai/gpt-5-nano' }}
      AI_GATEWAY_SCREEN_FALLBACK_MODELS: ${{ vars.AI_GATEWAY_SCREEN_FALLBACK_MODELS || 'google/gemini-2.5-flash-lite' }}
      AI_GATEWAY_MAX_OUTPUT_TOKENS: ${{ vars.AI_GATEWAY_MAX_OUTPUT_TOKENS || '32768' }}
      # Tuned in-repo (repo Actions variables held stale lower values and
      # silently clamped collection breadth; see docs/release-v0.19.0.md).
      MAX_RELEASE_REPOS: '32'
      MAX_RELEASES_PER_REPO: ${{ vars.MAX_RELEASES_PER_REPO || '3' }}
      MAX_SOURCE_WORKERS: '16'
      MAX_COLLECT_SECONDS: '150'
      GITHUB_API_MIN_INTERVAL: ${{ vars.GITHUB_API_MIN_INTERVAL || '0.5' }}
      RELEASE_REPOS: ${{ vars.RELEASE_REPOS || '' }}
      # Vendor changelog feeds/pages are enabled by default here (no repo variable
      # needed). Set the `CHANGELOG_FEEDS` / `CHANGELOG_PAGES` repo variables to
      # override. A feed/page that 404s is recorded in source-health.md but does
      # not block the run and the collector auto-recovers once it works again.
      CHANGELOG_FEEDS: "${{ vars.CHANGELOG_FEEDS || 'huggingface-blog=https://huggingface.co/blog/feed.xml,aws-whats-new=https://aws.amazon.com/about-aws/whats-new/recent/feed/,vercel-changelog=https://vercel.com/atom' }}"
      CHANGELOG_PAGES: "${{ vars.CHANGELOG_PAGES || 'devin-releases=https://docs.devin.ai/release-notes/overview,replit-updates=https://docs.replit.com/updates,warp-changelog=https://docs.warp.dev/changelog,cloudflare-changelog=https://developers.cloudflare.com/changelog/,factory-news=https://factory.ai/news,amp-chronicle=https://ampcode.com/chronicle,raycast-changelog=https://www.raycast.com/changelog' }}"
      COLLECT_REDDIT: ${{ vars.COLLECT_REDDIT || 'false' }}
      COLLECT_REDDIT_RSS: ${{ vars.COLLECT_REDDIT_RSS || 'true' }}
      COLLECT_BLUESKY: ${{ vars.COLLECT_BLUESKY || 'true' }}
      COLLECT_DEVTO: ${{ vars.COLLECT_DEVTO || 'true' }}
      COLLECT_LOBSTERS: ${{ vars.COLLECT_LOBSTERS || 'true' }}
      COLLECT_PYPI: ${{ vars.COLLECT_PYPI || 'true' }}
      PYPI_PACKAGES: ${{ vars.PYPI_PACKAGES || '' }}
      REDDIT_RSS_BATCH_SIZE: '10'
      SOCIAL_FEEDS: ${{ vars.SOCIAL_FEEDS || '' }}
      REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS || '' }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      X_SEARCH_QUERIES: ${{ vars.X_SEARCH_QUERIES || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show model provider
        run: |
          echo "Provider: $AGENT_RADAR_MODEL_PROVIDER"
          echo "GitHub model: $GITHUB_MODEL"
          echo "Cheap screen model: $CHEAP_SCREEN_MODEL"
          echo "Main research model: $MAIN_RESEARCH_MODEL"
          echo "Final synthesis model: $FINAL_SYNTHESIS_MODEL"
          echo "Max public source items: $MAX_PUBLIC_SOURCE_ITEMS"
          echo "Max Vercel AI Gateway calls per task: $MAX_AI_GATEWAY_CALLS_PER_TASK"
          echo "Max context file chars: $MAX_CONTEXT_FILE_CHARS"
          echo "Max screen prompt chars: $MAX_SCREEN_PROMPT_CHARS"
          echo "Research log context chars: $RESEARCH_LOG_CONTEXT_CHARS"
          echo "Watchlist context chars: $WATCHLIST_CONTEXT_CHARS"
          echo "Context slicing: $CONTEXT_SLICING"
          echo "Shared screening: $SHARED_SCREENING"
          echo "Include maintenance context: $INCLUDE_MAINTENANCE_CONTEXT"
          echo "Include runbook context: $INCLUDE_RUNBOOK_CONTEXT"
          echo "Max release repos: $MAX_RELEASE_REPOS"
          echo "Max releases per repo: $MAX_RELEASES_PER_REPO"
          echo "Max source workers: $MAX_SOURCE_WORKERS"
          echo "Max collect seconds: $MAX_COLLECT_SECONDS"

      - name: Run cloud agent
        env:
          # Pass dispatch inputs through env instead of interpolating them into
          # the script, so a repository_dispatch payload cannot inject shell.
          PAYLOAD_TASK: ${{ github.event.client_payload.task }}
          INPUT_TASK: ${{ github.event.inputs.task }}
          PAYLOAD_DATE: ${{ github.event.client_payload.date }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          set -euo pipefail
          TASK="${PAYLOAD_TASK:-${INPUT_TASK:-auto}}"
          DATE_INPUT="${PAYLOAD_DATE:-${INPUT_DATE:-}}"
          # Tee output so the failure alert can quote the refusal/error tail.
          if [ -n "$DATE_INPUT" ]; then
            python scripts/cloud_agent_runner.py --task "$TASK" --date "$DATE_INPUT" 2>&1 | tee -a run-output.log
          else
            python scripts/cloud_agent_runner.py --task "$TASK" 2>&1 | tee -a run-output.log
          fi

      - name: Validate
        run: |
          set -o pipefail
          {
            TODAY="$(date -u +%F)"
            DOW="$(date -u +%u)"
            python scripts/agent_radar.py ensure --date "$TODAY"
            python scripts/agent_radar.py bilingualize --date "$TODAY"
            python scripts/agent_radar.py brief --date "$TODAY"
            if [ "$DOW" = "7" ]; then
              python scripts/agent_radar.py validate --date "$TODAY" --tier full --strict-bilingual --require-chinese
            else
              python scripts/agent_radar.py validate --date "$TODAY" --tier daily --strict-bilingual --require-chinese
            fi
            python -m unittest discover -s tests
            python -m py_compile scripts/agent_radar.py scripts/cloud_agent_runner.py scripts/radar_bilingual.py scripts/radar_collector_state.py scripts/radar_corpus_audit.py
          } 2>&1 | tee -a run-output.log

      - name: Prune empty daily shell
        run: |
          # If the daily model task wrote nothing, `ensure` above left an empty
          # template block; drop it so an empty daily shell is never committed.
          TODAY="$(date -u +%F)"
          python scripts/agent_radar.py prune-empty-daily --date "$TODAY"

      - name: Scan for obvious secrets
        run: |
          # source-cache.jsonl and collector-state.json hold machine-written external
          # titles/URLs/error details; scanning them risks false positives from external
          # content while they never contain repo secrets. Reports and code stay scanned.
          # `sk-` needs a left boundary: slugs like "ask-copilot-..." or ids like
          # "scr-ask-hn-..." contain "sk-<20 chars>" and false-positived the scan.
          if grep -RInE --exclude=validate.yml --exclude=cloud-agent.yml --exclude=source-cache.jsonl --exclude=collector-state.json --exclude=run-output.log --exclude-dir=.git --exclude-dir=__pycache__ '((^|[^A-Za-z0-9])sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|gho_[A-Za-z0-9_]{20,}|BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY|AKIA[0-9A-Z]{16}|OPENAI_API_KEY\s*=|ANTHROPIC_API_KEY\s*=)' .; then
            echo "Possible secret detected."
            exit 1
          fi

      - name: Commit and push changes
        run: |
          # Use --porcelain (not `git diff --quiet`) so runs whose only output is
          # NEW files — a new-month daily file, telemetry/screening artifacts —
          # are detected and committed instead of silently discarded.
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "agent-radar-cloud"
          git config user.email "agent-radar-cloud@users.noreply.github.com"
          git add -A
          git commit -m "Cloud agent radar update $(date -u +%F)"
          # A 30-50 minute run can race concurrent pushes to main; append-heavy
          # files auto-resolve via merge=union (.gitattributes). Retry the
          # rebase+push a few times before failing the job.
          for attempt in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME:-main}" && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt ${attempt} failed; retrying"
            sleep $((attempt * 5))
          done
          echo "Failed to push after 3 attempts (persistent conflict or network issue)."
          exit 1

      - name: Fail on partial task failure
        # The runner exits 0 when at least one task succeeded so partial results
        # get committed — but a failed daily (the product) must still alert.
        # This runs AFTER commit, so surfacing the failure loses nothing.
        run: |
          if [ -f run-output.log ] && grep -qE 'Task (daily|weekly|monthly) (failed|errored):' run-output.log; then
            echo "A report task failed inside an otherwise-green run:"
            FAILED_LINES="$(grep -E 'Task (daily|weekly|monthly) (failed|errored):' run-output.log | tail -3)"
            echo "$FAILED_LINES"
            # Append to the log so the alert issue quotes the failure lines
            # instead of whatever test output happens to be in the tail.
            { echo "--- failed report tasks ---"; echo "$FAILED_LINES"; } >> run-output.log
            exit 1
          fi

      - name: Alert on failure
        # Failure ledger + notification: open (or comment on) a labeled issue so
        # failed runs — especially scheduled ones and gate refusals — surface as
        # GitHub notifications instead of dying silently in the Actions tab.
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let tail = '(no captured runner log; open the run link for details)';
            try {
              const lines = fs.readFileSync('run-output.log', 'utf8').trim().split('\n');
              tail = lines.slice(-40).join('\n');
            } catch (e) {}
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = 'cloud-agent-failure';
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: label,
                color: 'd73a4a',
                description: 'Automated alert: cloud agent workflow run failed',
              });
            }
            const body = [
              `Run: ${runUrl}`,
              `Event: ${context.eventName}`,
              `Failed at (UTC): ${new Date().toISOString()}`,
              '',
              'Last runner output:',
              '```',
              tail,
              '```',
              '',
              '_Close this issue once the cause is fixed; the next failure reopens the thread._',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: label, per_page: 1,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: open.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title: 'Cloud Agent run failed',
                labels: [label],
                body,
              });
            }
