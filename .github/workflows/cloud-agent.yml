name: Cloud Agent

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - daily
          - weekly
          - monthly
          - source-sweep
          - promote-candidates
      date:
        description: "Optional date, YYYY-MM-DD"
        required: false
        type: string
  repository_dispatch:
    types: [cloud-agent]

permissions:
  contents: write
  models: read

concurrency:
  group: cloud-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      AGENT_RADAR_MODEL_PROVIDER: ${{ vars.AGENT_RADAR_MODEL_PROVIDER || 'github-models' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4o' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      CHEAP_SCREEN_MODEL: ${{ vars.CHEAP_SCREEN_MODEL || 'deepseek/deepseek-v4-flash' }}
      MAIN_RESEARCH_MODEL: ${{ vars.MAIN_RESEARCH_MODEL || 'deepseek/deepseek-v4-pro' }}
      FINAL_SYNTHESIS_MODEL: ${{ vars.FINAL_SYNTHESIS_MODEL || 'z-ai/glm-5.2' }}
      MAX_PUBLIC_SOURCE_ITEMS: ${{ vars.MAX_PUBLIC_SOURCE_ITEMS || '' }}
      PUBLIC_SOURCE_COLLECTION: ${{ vars.PUBLIC_SOURCE_COLLECTION || 'true' }}
      MAX_OPENROUTER_CALLS_PER_TASK: ${{ vars.MAX_OPENROUTER_CALLS_PER_TASK || '' }}
      MAX_PROMPT_CHARS: ${{ vars.MAX_PROMPT_CHARS || '' }}
      DRY_RUN_ON_BUDGET_EXCEEDED: ${{ vars.DRY_RUN_ON_BUDGET_EXCEEDED || 'true' }}
      OPENROUTER_FALLBACK_MODELS: ${{ vars.OPENROUTER_FALLBACK_MODELS || 'deepseek/deepseek-v4-pro,z-ai/glm-5.2' }}
      MAX_RELEASE_REPOS: ${{ vars.MAX_RELEASE_REPOS || '20' }}
      MAX_RELEASES_PER_REPO: ${{ vars.MAX_RELEASES_PER_REPO || '3' }}
      MAX_SOURCE_WORKERS: ${{ vars.MAX_SOURCE_WORKERS || '12' }}
      MAX_COLLECT_SECONDS: ${{ vars.MAX_COLLECT_SECONDS || '60' }}
      RELEASE_REPOS: ${{ vars.RELEASE_REPOS || '' }}
      CHANGELOG_FEEDS: ${{ vars.CHANGELOG_FEEDS || '' }}
      CHANGELOG_PAGES: ${{ vars.CHANGELOG_PAGES || '' }}
      COLLECT_REDDIT: ${{ vars.COLLECT_REDDIT || 'false' }}
      COLLECT_REDDIT_RSS: ${{ vars.COLLECT_REDDIT_RSS || 'true' }}
      COLLECT_BLUESKY: ${{ vars.COLLECT_BLUESKY || 'true' }}
      COLLECT_DEVTO: ${{ vars.COLLECT_DEVTO || 'true' }}
      COLLECT_LOBSTERS: ${{ vars.COLLECT_LOBSTERS || 'true' }}
      COLLECT_PYPI: ${{ vars.COLLECT_PYPI || 'true' }}
      PYPI_PACKAGES: ${{ vars.PYPI_PACKAGES || '' }}
      REDDIT_RSS_BATCH_SIZE: ${{ vars.REDDIT_RSS_BATCH_SIZE || '1' }}
      SOCIAL_FEEDS: ${{ vars.SOCIAL_FEEDS || '' }}
      REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS || '' }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      X_SEARCH_QUERIES: ${{ vars.X_SEARCH_QUERIES || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show model provider
        run: |
          echo "Provider: $AGENT_RADAR_MODEL_PROVIDER"
          echo "GitHub model: $GITHUB_MODEL"
          echo "Cheap screen model: $CHEAP_SCREEN_MODEL"
          echo "Main research model: $MAIN_RESEARCH_MODEL"
          echo "Final synthesis model: $FINAL_SYNTHESIS_MODEL"
          echo "Max public source items: $MAX_PUBLIC_SOURCE_ITEMS"
          echo "Max OpenRouter calls per task: $MAX_OPENROUTER_CALLS_PER_TASK"
          echo "Max release repos: $MAX_RELEASE_REPOS"
          echo "Max releases per repo: $MAX_RELEASES_PER_REPO"
          echo "Max source workers: $MAX_SOURCE_WORKERS"
          echo "Max collect seconds: $MAX_COLLECT_SECONDS"

      - name: Run cloud agent
        run: |
          TASK="${{ github.event.client_payload.task || github.event.inputs.task || 'auto' }}"
          DATE_INPUT="${{ github.event.client_payload.date || github.event.inputs.date }}"
          if [ -n "$DATE_INPUT" ]; then
            python scripts/cloud_agent_runner.py --task "$TASK" --date "$DATE_INPUT"
          else
            python scripts/cloud_agent_runner.py --task "$TASK"
          fi

      - name: Validate
        run: |
          TODAY="$(date -u +%F)"
          python scripts/agent_radar.py ensure --date "$TODAY"
          python scripts/agent_radar.py bilingualize --date "$TODAY"
          python scripts/agent_radar.py brief --date "$TODAY"
          python scripts/agent_radar.py validate --date "$TODAY" --strict-bilingual --require-chinese
          python -m unittest discover -s tests
          python -m py_compile scripts/agent_radar.py scripts/cloud_agent_runner.py scripts/radar_bilingual.py scripts/radar_collector_state.py

      - name: Scan for obvious secrets
        run: |
          # source-cache.jsonl and collector-state.json hold machine-written external
          # titles/URLs/error details; scanning them risks false positives from external
          # content while they never contain repo secrets. Reports and code stay scanned.
          if grep -RInE --exclude=validate.yml --exclude=cloud-agent.yml --exclude=source-cache.jsonl --exclude=collector-state.json --exclude-dir=.git --exclude-dir=__pycache__ '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|gho_[A-Za-z0-9_]{20,}|BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY|AKIA[0-9A-Z]{16}|OPENAI_API_KEY\s*=|ANTHROPIC_API_KEY\s*=)' .; then
            echo "Possible secret detected."
            exit 1
          fi

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "agent-radar-cloud"
          git config user.email "agent-radar-cloud@users.noreply.github.com"
          git add .
          git commit -m "Cloud agent radar update $(date -u +%F)"
          git push
