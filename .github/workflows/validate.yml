name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional validation date, YYYY-MM-DD"
        required: false
        type: string
      strict_bilingual:
        description: "Run strict bilingual validation"
        required: false
        default: true
        type: boolean
      require_chinese:
        description: "Require substantive 中文 content in reports"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [validate]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile CLI
        run: python -m py_compile scripts/agent_radar.py scripts/cloud_agent_runner.py scripts/radar_bilingual.py scripts/radar_collector_state.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Scan for obvious secrets
        run: |
          if grep -RInE --exclude=validate.yml --exclude=cloud-agent.yml --exclude-dir=.git --exclude-dir=__pycache__ '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|gho_[A-Za-z0-9_]{20,}|BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY|AKIA[0-9A-Z]{16}|OPENAI_API_KEY\s*=|ANTHROPIC_API_KEY\s*=)' .; then
            echo "Possible secret detected."
            exit 1
          fi

      - name: Validate structure
        env:
          VALIDATE_DATE: ${{ github.event.client_payload.date || github.event.inputs.date || '2026-07-02' }}
          STRICT_BILINGUAL: ${{ github.event.client_payload.strict_bilingual != false && github.event.inputs.strict_bilingual != false }}
          REQUIRE_CHINESE: ${{ github.event.client_payload.require_chinese == true || github.event.inputs.require_chinese == true }}
        run: |
          STRICT_ARGS=""
          MANUAL_TRIGGER=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MANUAL_TRIGGER=true
          fi
          if [ "$MANUAL_TRIGGER" != "true" ] || [ "$STRICT_BILINGUAL" = "true" ]; then
            STRICT_ARGS="--strict-bilingual"
          fi
          if [ "$MANUAL_TRIGGER" != "true" ] || [ "$REQUIRE_CHINESE" = "true" ]; then
            if [ "$MANUAL_TRIGGER" != "true" ]; then
              STRICT_ARGS="$STRICT_ARGS --require-chinese"
            elif [ "$REQUIRE_CHINESE" = "true" ]; then
              STRICT_ARGS="$STRICT_ARGS --require-chinese"
            fi
          fi
          python scripts/agent_radar.py bilingualize --date "$VALIDATE_DATE"
          python scripts/agent_radar.py validate --date "$VALIDATE_DATE" $STRICT_ARGS
          TODAY="$(date -u +%F)"
          python scripts/agent_radar.py ensure --date "$TODAY"
          python scripts/agent_radar.py bilingualize --date "$TODAY"
          python scripts/agent_radar.py validate --date "$TODAY" $STRICT_ARGS
