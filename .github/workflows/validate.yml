name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional validation date, YYYY-MM-DD"
        required: false
        type: string
      strict_bilingual:
        description: "Run strict bilingual validation"
        required: false
        default: true
        type: boolean
      require_chinese:
        description: "Require substantive 中文 content in reports"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [validate]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile CLI
        run: python -m py_compile scripts/agent_radar.py scripts/cloud_agent_runner.py scripts/radar_bilingual.py scripts/radar_collector_state.py scripts/radar_corpus_audit.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Scan for obvious secrets
        run: |
          # source-cache.jsonl and collector-state.json hold machine-written external
          # titles/URLs/error details; scanning them risks false positives from external
          # content while they never contain repo secrets. Reports and code stay scanned.
          # `sk-` needs a left boundary: slugs like "ask-copilot-..." false-positive otherwise.
          if grep -RInE --exclude=validate.yml --exclude=cloud-agent.yml --exclude=source-cache.jsonl --exclude=collector-state.json --exclude=run-output.log --exclude-dir=.git --exclude-dir=__pycache__ '((^|[^A-Za-z0-9])sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|gho_[A-Za-z0-9_]{20,}|BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY|AKIA[0-9A-Z]{16}|OPENAI_API_KEY\s*=|ANTHROPIC_API_KEY\s*=)' .; then
            echo "Possible secret detected."
            exit 1
          fi

      - name: Validate structure
        env:
          EVENT_NAME: ${{ github.event_name }}
          # Raw context values are passed through env (never interpolated into
          # the shell) and compared as strings, which is null-safe. GitHub's
          # expression coercion makes `null != false` evaluate true, so the old
          # inline booleans could never enable the strict flags on dispatch.
          INPUT_DATE: ${{ github.event.inputs.date }}
          PAYLOAD_DATE: ${{ github.event.client_payload.date }}
          INPUT_STRICT: ${{ github.event.inputs.strict_bilingual }}
          PAYLOAD_STRICT: ${{ github.event.client_payload.strict_bilingual }}
          INPUT_REQUIRE_CN: ${{ github.event.inputs.require_chinese }}
          PAYLOAD_REQUIRE_CN: ${{ github.event.client_payload.require_chinese }}
        run: |
          set -eu
          # Default push/PR to the repo invariant: strict bilingual + require CN.
          STRICT_BILINGUAL=true
          REQUIRE_CHINESE=true
          VALIDATE_DATE="${INPUT_DATE:-${PAYLOAD_DATE:-}}"
          case "$EVENT_NAME" in
            workflow_dispatch)
              [ "${INPUT_STRICT:-true}" = "false" ] && STRICT_BILINGUAL=false
              REQUIRE_CHINESE=false
              [ "${INPUT_REQUIRE_CN:-false}" = "true" ] && REQUIRE_CHINESE=true
              ;;
            repository_dispatch)
              [ "${PAYLOAD_STRICT:-true}" = "false" ] && STRICT_BILINGUAL=false
              REQUIRE_CHINESE=false
              [ "${PAYLOAD_REQUIRE_CN:-false}" = "true" ] && REQUIRE_CHINESE=true
              ;;
          esac
          STRICT_ARGS=""
          [ "$STRICT_BILINGUAL" = "true" ] && STRICT_ARGS="--strict-bilingual"
          [ "$REQUIRE_CHINESE" = "true" ] && STRICT_ARGS="$STRICT_ARGS --require-chinese"

          # When an explicit date is provided, strictly validate that date's
          # committed reports; there is no hardcoded fallback date anymore.
          if [ -n "$VALIDATE_DATE" ]; then
            python scripts/agent_radar.py bilingualize --date "$VALIDATE_DATE"
            python scripts/agent_radar.py validate --date "$VALIDATE_DATE" $STRICT_ARGS
          fi

          # Always ensure and validate today's reports (UTC), so current
          # structure is checked on every push instead of only a fixed date.
          TODAY="$(date -u +%F)"
          python scripts/agent_radar.py ensure --date "$TODAY"
          python scripts/agent_radar.py bilingualize --date "$TODAY"
          python scripts/agent_radar.py validate --date "$TODAY" $STRICT_ARGS
